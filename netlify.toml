[build]
  command = "node ./quartz/bootstrap-cli.mjs plugin install --from-config && node ./quartz/bootstrap-cli.mjs build"
  publish = "public"

[build.environment]
  NODE_VERSION = "22"

[[redirects]]
  from = "http://sood.one/*"
  to = "https://sood.one/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.sood.one/*"
  to = "https://sood.one/:splat"
  status = 301
  force = true
