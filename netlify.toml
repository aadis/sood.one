[build]
  # Wipe .quartz first: if the plugin dirs persist between CI builds, the
  # installer short-circuits ("already installed") and never regenerates
  # .quartz/plugins/index.ts, which Head.tsx imports — breaking the build.
  command = "rm -rf .quartz && node ./quartz/bootstrap-cli.mjs plugin install --from-config && node ./quartz/bootstrap-cli.mjs build"
  publish = "public"

[build.environment]
  NODE_VERSION = "26.3.0"

[[redirects]]
  from = "http://sood.one/*"
  to = "https://sood.one/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.sood.one/*"
  to = "https://sood.one/:splat"
  status = 301
  force = true
