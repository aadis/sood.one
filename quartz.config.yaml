# yaml-language-server: $schema=./quartz/plugins/quartz-plugins.schema.json
configuration:
  pageTitle: Aaditya Sood
  pageTitleSuffix: ""
  enableSPA: true
  enablePopovers: true
  analytics:
    provider: plausible
  locale: en-US
  baseUrl: sood.one
  ignorePatterns:
    - .obsidian
    - _config
    - _inbox
    - _meta
    - _state
    - _local
    - _output
    - _parked
    - _SHIPPED
    - "3-Journal"
    - "4-Private"
  theme:
    fontOrigin: googleFonts
    cdnCaching: true
    typography:
      header: Fraunces
      body: Inter
      code: JetBrains Mono
    colors:
      lightMode:
        light: "#fcfcfb"
        lightgray: "#ececef"
        gray: "#8a8a8f"
        darkgray: "#2a2a2c"
        dark: "#1c1c1e"
        secondary: "#3a6b6b"
        tertiary: "#4f8a8a"
        highlight: rgba(58, 107, 107, 0.07)
        textHighlight: "#fbe79e88"
      darkMode:
        light: "#161618"
        lightgray: "#2a2a2d"
        gray: "#6e6e74"
        darkgray: "#cdcdd2"
        dark: "#ececee"
        secondary: "#6fb3b3"
        tertiary: "#8acccc"
        highlight: rgba(111, 179, 179, 0.10)
        textHighlight: "#b3920288"
plugins:
  - source: github:quartz-community/created-modified-date
    enabled: true
    options:
      defaultDateType: modified
      priority:
        - frontmatter
        - git
        - filesystem
    order: 10
  - source: github:quartz-community/syntax-highlighting
    enabled: true
    options:
      theme:
        light: github-light
        dark: github-dark
      keepBackground: false
    order: 20
  - source: github:quartz-community/obsidian-flavored-markdown
    enabled: true
    options:
      enableInHtmlEmbed: false
      enableCheckbox: true
    order: 30
  - source: github:quartz-community/github-flavored-markdown
    enabled: true
    order: 40
  - source: github:quartz-community/table-of-contents
    enabled: true
    order: 50
    layout:
      position: right
      priority: 30
  - source: github:quartz-community/crawl-links
    enabled: true
    options:
      markdownLinkResolution: shortest
    order: 60
  - source: github:quartz-community/description
    enabled: true
    order: 70
  - source: github:quartz-community/latex
    enabled: true
    options:
      renderEngine: katex
    order: 80
  - source: github:quartz-community/fonts
    enabled: true
    options:
      fontOrigin: googleFonts
      useThemeFonts: false
      header:
        name: Fraunces
        weights: [400, 500, 600]
        includeItalic: true
      body:
        name: Inter
        weights: [400, 500, 600]
        includeItalic: true
      code:
        name: JetBrains Mono
        weights: [400, 500]
  - source: github:quartz-community/remove-draft
    enabled: false
  - source: github:quartz-community/explicit-publish
    enabled: true
  - source: github:quartz-community/alias-redirects
    enabled: true
  - source: github:quartz-community/content-index
    enabled: true
    options:
      enableSiteMap: true
      enableRSS: true
  - source: github:quartz-community/favicon
    enabled: true
  - source: github:quartz-community/og-image
    enabled: true
  - source: github:quartz-community/cname
    enabled: true
  - source: github:quartz-community/canvas-page
    enabled: true
  - source: github:quartz-community/content-page
    enabled: true
  - source: github:quartz-community/folder-page
    enabled: true
  - source: github:quartz-community/tag-page
    enabled: true
  - source: github:quartz-community/explorer
    enabled: true
    layout:
      position: left
      priority: 50
  - source: github:quartz-community/graph
    enabled: true
    layout:
      position: right
      priority: 10
  - source: github:quartz-community/search
    enabled: true
    layout:
      position: left
      priority: 20
      group: toolbar
      groupOptions:
        grow: true
  - source: github:quartz-community/backlinks
    enabled: true
    layout:
      position: right
      priority: 50
  - source: github:quartz-community/article-title
    enabled: true
    layout:
      position: beforeBody
      priority: 10
  - source: github:quartz-community/content-meta
    enabled: true
    layout:
      position: beforeBody
      priority: 20
  - source: github:quartz-community/page-title
    enabled: true
    layout:
      position: left
      priority: 10
  - source: github:quartz-community/darkmode
    enabled: true
    layout:
      position: left
      priority: 30
      group: toolbar
  - source: github:quartz-community/reader-mode
    enabled: true
    layout:
      position: left
      priority: 35
      group: toolbar
  - source: github:quartz-community/breadcrumbs
    enabled: true
    layout:
      position: beforeBody
      priority: 5
      condition: not-index
  - source: github:quartz-community/footer
    enabled: true
    options:
      links:
        X: https://x.com/aaditya
        LinkedIn: https://linkedin.com/in/aadis
  - source: github:quartz-community/spacer
    enabled: true
    options: {}
    order: 25
    layout:
      position: left
      priority: 25
      display: mobile-only
  - source: github:quartz-community/note-properties
    enabled: true
    options:
      includeAll: false
      includedProperties:
        - description
        - tags
      excludedProperties:
        - publish
        - type
        - status
        - summary
      hidePropertiesView: true
      delimiters: ---
      language: yaml
    order: 5
    layout:
      position: beforeBody
      priority: 15
      display: all
  - source: github:quartz-community/recent-notes
    enabled: true
    options:
      title: Recent posts
      limit: 5
      linkToMore: posts/
      showTags: true
      hideFolderPages: true
      hideTagPages: true
    layout:
      position: afterBody
      priority: 10
      condition: index
layout:
  groups:
    toolbar:
      priority: 35
      direction: row
      gap: 0.5rem
  byPageType:
    "404":
      positions:
        beforeBody: []
        left: []
        right: []
    content: {}
    folder:
      exclude:
        - reader-mode
      positions:
        right: []
    tag:
      exclude:
        - reader-mode
      positions:
        right: []
    canvas: {}
    bases: {}
